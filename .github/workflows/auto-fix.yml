name: Auto Fix

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  check_run:
    types: [completed]

jobs:
  check-and-trigger:
    # Fire when greptile or coderabbit post on a PR, or when CI fails
    if: |
      (
        (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
        (github.event.comment.user.login == 'greptile-apps[bot]' ||
         github.event.comment.user.login == 'coderabbitai[bot]') &&
        github.event.issue.pull_request != null
      ) || (
        github.event_name == 'check_run' &&
        github.event.check_run.conclusion == 'failure' &&
        github.event.check_run.pull_requests[0] != null &&
        (
          github.event.check_run.name == 'lint' ||
          github.event.check_run.name == 'build' ||
          github.event.check_run.name == 'test'
        )
      )
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Get PR number and event context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, failedCheck;
            if (context.eventName === 'check_run') {
              prNumber = context.payload.check_run.pull_requests[0].number;
              failedCheck = context.payload.check_run.name;
            } else {
              prNumber = context.issue.number;
            }
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('is_ci_failure', context.eventName === 'check_run' ? 'true' : 'false');
            core.setOutput('failed_check', failedCheck || '');

      - name: Skip agent-managed PRs
        id: agent-check
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: parseInt('${{ steps.ctx.outputs.pr_number }}'),
            });
            const headRef = pr.data.head.ref;
            if (headRef.startsWith('agent/') || headRef.startsWith('recover/')) {
              console.log(`Skipping agent-managed branch: ${headRef}`);
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Check for auto-fixing label
        id: label-check
        if: steps.agent-check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.ctx.outputs.pr_number }}'),
            });
            if (labels.some(l => l.name === 'auto-fixing')) {
              console.log('auto-fixing label present, skipping');
              core.setOutput('skip', 'true');
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Add auto-fixing label
        if: steps.agent-check.outputs.skip == 'false' && steps.label-check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.ctx.outputs.pr_number }}'),
              labels: ['auto-fixing'],
            });

      # Wait to give the other reviewer a chance to post before Claude reads comments.
      # If coderabbit is rate-limited or absent, we still proceed after the window.
      - name: Wait for other reviewers (3 min window)
        if: steps.agent-check.outputs.skip == 'false' && steps.label-check.outputs.skip == 'false' && steps.ctx.outputs.is_ci_failure == 'false'
        run: sleep 180

      - name: Trigger Claude to fix all review feedback
        if: steps.agent-check.outputs.skip == 'false' && steps.label-check.outputs.skip == 'false' && steps.ctx.outputs.is_ci_failure == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            // Collect which reviewers actually posted so Claude knows what to read
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.ctx.outputs.pr_number }}'),
              per_page: 100,
            });
            const hasGreptile = comments.some(c => c.user.login === 'greptile-apps[bot]');
            const hasCodeRabbit = comments.some(c => c.user.login === 'coderabbitai[bot]');

            const reviewers = [
              hasGreptile && '`greptile-apps[bot]`',
              hasCodeRabbit && '`coderabbitai[bot]`',
            ].filter(Boolean).join(' and ');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.ctx.outputs.pr_number }}'),
              body: `@claude Please fix all issues raised by the reviewers on this PR.

            Feedback available from: ${reviewers}

            Steps:
            1. Read every comment from ${reviewers} on this PR
            2. Fix every issue they flagged — bugs, security concerns, TypeScript issues, missing error handling, test gaps
            3. Commit and push fixes to this branch
            4. Remove the \`auto-fixing\` label from this PR

            Do not close or delete the PR. Do not skip issues. If a reviewer flags something, fix it or leave a clear explanation as a PR comment.
            5. Run \`gh pr merge --auto --squash --repo ${{ github.repository }} ${{ steps.ctx.outputs.pr_number }}\` to queue it for merge once CI passes.`,
            });

      - name: Trigger Claude to fix CI failure
        if: steps.agent-check.outputs.skip == 'false' && steps.label-check.outputs.skip == 'false' && steps.ctx.outputs.is_ci_failure == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ steps.ctx.outputs.pr_number }}'),
              body: `@claude The CI check \`${{ steps.ctx.outputs.failed_check }}\` is failing on this PR.

            Steps:
            1. Run the failing check locally to see exact errors (\`npm run ${{ steps.ctx.outputs.failed_check }}\`)
            2. Fix every failing error — do not suppress, do not skip
            3. Commit and push fixes to this branch
            4. Remove the \`auto-fixing\` label from this PR
            5. Run \`gh pr merge --auto --squash --repo ${{ github.repository }} ${{ steps.ctx.outputs.pr_number }}\` to queue it for merge once CI passes.

            Focus on the \`${{ steps.ctx.outputs.failed_check }}\` failure. Fix the root cause.`,
            });

      - name: Remove auto-fixing label (cleanup)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.ctx.outputs.pr_number }}');
            if (!prNumber) return;
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'auto-fixing',
              });
            } catch (e) { /* already removed by Claude or never added */ }
