name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (
        contains(github.event.issue.body, '@claude') ||
        github.event.action == 'assigned' ||
        github.event.action == 'labeled'
      ))
    runs-on: [self-hosted, Linux, X64]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Skip agent-managed PRs
        id: agent-check
        uses: actions/github-script@v7
        with:
          script: |
            // For PR comment events, check if the PR is on an agent-managed branch.
            // Agent-managed PRs are handled by the wopr-auto pipeline — never by CI.
            const prNumber = context.issue?.number ?? context.payload?.pull_request?.number;
            if (prNumber) {
              try {
                const pr = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                });
                const headRef = pr.data.head.ref;
                if (headRef.startsWith('agent/') || headRef.startsWith('recover/')) {
                  console.log(`Skipping agent-managed branch: ${headRef}`);
                  core.setOutput('skip', 'true');
                  return;
                }
              } catch (e) {
                console.log('Not a PR context or PR lookup failed, continuing');
              }
            }
            core.setOutput('skip', 'false');

      - uses: actions/checkout@v4
        if: steps.agent-check.outputs.skip == 'false'
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        if: steps.agent-check.outputs.skip == 'false'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_claude_code_executable: /home/runner/.local/bin/claude
